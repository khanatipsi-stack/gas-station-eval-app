<script>
    // 🔗 นำ URL ที่ได้จาก Google Apps Script มาวางตรงนี้
    const GAS_API_URL = "วาง_WEB_APP_URL_ที่ได้จาก_APPS_SCRIPT_ตรงนี้";

    document.addEventListener('DOMContentLoaded', function() {
      loadDataFromGAS();
      renderRubricCards();
    });

    // ดึงข้อมูลโครงการจาก Google Sheets ผ่าน Fetch API
    function loadDataFromGAS() {
      if (!GAS_API_URL || GAS_API_URL.includes("วาง_WEB_APP_URL")) {
        console.warn("ยังไม่ได้ใส่ URL ของ Google Apps Script API");
        return;
      }

      fetch(GAS_API_URL)
        .then(response => response.json())
        .then(data => {
          if (data.status === 'success' && data.projects) {
            populateProjectDropdown(data.projects);
          } else {
            alert("เกิดข้อผิดพลาดจาก Google Sheet: " + (data.message || "ไม่พบข้อมูล"));
          }
        })
        .catch(err => {
          console.error("Fetch Error:", err);
          alert("ไม่สามารถดึงข้อมูลจาก Google Sheets ได้ กรุณาเช็ค CORS หรือ URL API");
        });
    }

    // แสดงผลข้อมูลลงใน Dropdown
    function populateProjectDropdown(projects) {
      const selectElem = document.getElementById('evalProjectSelect');
      const statTotal = document.getElementById('stat-total');
      
      if (selectElem) {
        selectElem.innerHTML = '<option value="">-- กรุณาเลือกสาขา --</option>';
        projects.forEach(prj => {
          const opt = document.createElement('option');
          opt.value = prj.id;
          opt.textContent = `${prj.id} - ${prj.name} (${prj.contractor})`;
          selectElem.appendChild(opt);
        });
      }

      if (statTotal) {
        statTotal.textContent = projects.length;
      }
    }

    // Render การ์ดเกณฑ์ 12 ข้อ
    function renderRubricCards() {
      const container = document.getElementById('rubricCardsContainer');
      if (!container || typeof criteria12 === 'undefined') return;
      
      container.innerHTML = '';
      criteria12.forEach(item => {
        const cardHtml = `
          <div class="card rubric-card p-3" id="rubric-card-${item.id}">
            <div class="fw-bold text-primary mb-2">${item.title} (น้ำหนัก ${item.weight}%)</div>
            <div class="row g-2">
              <div class="col"><div class="rubric-option" onclick="selectScore(${item.id}, 1, this)"><b>1:</b> ${item.r1}</div></div>
              <div class="col"><div class="rubric-option" onclick="selectScore(${item.id}, 2, this)"><b>2:</b> ${item.r2}</div></div>
              <div class="col"><div class="rubric-option" onclick="selectScore(${item.id}, 3, this)"><b>3:</b> ${item.r3}</div></div>
              <div class="col"><div class="rubric-option" onclick="selectScore(${item.id}, 4, this)"><b>4:</b> ${item.r4}</div></div>
              <div class="col"><div class="rubric-option" onclick="selectScore(${item.id}, 5, this)"><b>5:</b> ${item.r5}</div></div>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHtml);
      });
    }

    function selectScore(topicId, score, elem) {
      const parentCard = document.getElementById(`rubric-card-${topicId}`);
      const options = parentCard.querySelectorAll('.rubric-option');
      options.forEach(opt => opt.classList.remove('active'));
      elem.classList.add('active');
      parentCard.classList.add('selected');
    }

    function toggleAiChat() {
      document.getElementById('aiChatDrawer').classList.toggle('collapsed');
    }
  </script>
</body>
</html>
